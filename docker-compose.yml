version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: modern_pos_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-modern_pos}
    ports:
      - "5434:5432"
    volumes:
      - pos_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: modern_pos_web
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/pos-shared/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8001/api}
    # Flag --host es absolutamente obligatorio en Docker para Vite, de lo contrario bloquea el acceso externo al localhost interno
    command: sh -c "pnpm install && cd apps/web && pnpm dev --host 0.0.0.0"

volumes:
  pos_db_data:
    name: pos_db_data_dev
